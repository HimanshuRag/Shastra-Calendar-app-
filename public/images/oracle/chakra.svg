<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Dharma Chakra (Wheel) - minimalist line art -->
  <circle cx="100" cy="100" r="98" fill="rgba(232,89,26,0.04)" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
  
  <!-- Outer rim -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#E8591A" stroke-width="2"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="rgba(232,89,26,0.3)" stroke-width="0.5"/>
  
  <!-- 12 spokes of the Dharma Chakra -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
  <line x1="50.5" y1="50.5" x2="149.5" y2="149.5" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
  <line x1="149.5" y1="50.5" x2="50.5" y2="149.5" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
  <!-- diagonal spokes -->
  <line x1="65" y1="34" x2="135" y2="166" stroke="#D4AF37" stroke-width="1" opacity="0.45"/>
  <line x1="135" y1="34" x2="65" y2="166" stroke="#D4AF37" stroke-width="1" opacity="0.45"/>
  <line x1="34" y1="65" x2="166" y2="135" stroke="#D4AF37" stroke-width="1" opacity="0.45"/>
  <line x1="166" y1="65" x2="34" y2="135" stroke="#D4AF37" stroke-width="1" opacity="0.45"/>
  <!-- extra 4 spokes -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#E8591A" stroke-width="0.5" opacity="0.3" transform="rotate(15 100 100)"/>
  <line x1="100" y1="30" x2="100" y2="170" stroke="#E8591A" stroke-width="0.5" opacity="0.3" transform="rotate(-15 100 100)"/>
  <line x1="100" y1="30" x2="100" y2="170" stroke="#E8591A" stroke-width="0.5" opacity="0.3" transform="rotate(75 100 100)"/>
  <line x1="100" y1="30" x2="100" y2="170" stroke="#E8591A" stroke-width="0.5" opacity="0.3" transform="rotate(-75 100 100)"/>
  
  <!-- Inner hub -->
  <circle cx="100" cy="100" r="16" fill="rgba(212,175,55,0.15)" stroke="#D4AF37" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="rgba(232,89,26,0.2)" stroke="#E8591A" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="3" fill="#D4AF37" opacity="0.8"/>
  
  <!-- Decorative dots on rim -->
  <circle cx="100" cy="32" r="3" fill="#D4AF37" opacity="0.7"/>
  <circle cx="148" cy="51" r="2.5" fill="#D4AF37" opacity="0.6"/>
  <circle cx="168" cy="100" r="3" fill="#D4AF37" opacity="0.7"/>
  <circle cx="148" cy="149" r="2.5" fill="#D4AF37" opacity="0.6"/>
  <circle cx="100" cy="168" r="3" fill="#D4AF37" opacity="0.7"/>
  <circle cx="52" cy="149" r="2.5" fill="#D4AF37" opacity="0.6"/>
  <circle cx="32" cy="100" r="3" fill="#D4AF37" opacity="0.7"/>
  <circle cx="52" cy="51" r="2.5" fill="#D4AF37" opacity="0.6"/>
</svg>
