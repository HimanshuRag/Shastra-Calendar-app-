<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Lotus flower - minimalist line art with saffron/gold tones -->
  <circle cx="100" cy="100" r="98" fill="rgba(232,89,26,0.04)" stroke="rgba(212,175,55,0.2)" stroke-width="1"/>
  
  <!-- Center circle -->
  <circle cx="100" cy="105" r="12" fill="rgba(212,175,55,0.15)" stroke="#D4AF37" stroke-width="1.5"/>
  <circle cx="100" cy="105" r="5" fill="#D4AF37" opacity="0.6"/>
  
  <!-- Main petals -->
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="rgba(232,89,26,0.12)" stroke="#E8591A" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="none" stroke="rgba(212,175,55,0.5)" stroke-width="0.5" transform="rotate(0 100 105)"/>
  
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="rgba(232,89,26,0.10)" stroke="#E8591A" stroke-width="1.5" transform="rotate(45 100 105)"/>
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="rgba(232,89,26,0.10)" stroke="#E8591A" stroke-width="1.5" transform="rotate(90 100 105)"/>
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="rgba(232,89,26,0.10)" stroke="#E8591A" stroke-width="1.5" transform="rotate(135 100 105)"/>
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="rgba(232,89,26,0.08)" stroke="#E8591A" stroke-width="1.2" transform="rotate(180 100 105)"/>
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="rgba(232,89,26,0.08)" stroke="#E8591A" stroke-width="1.2" transform="rotate(225 100 105)"/>
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="rgba(232,89,26,0.08)" stroke="#E8591A" stroke-width="1.2" transform="rotate(270 100 105)"/>
  <ellipse cx="100" cy="72" rx="10" ry="28" fill="rgba(232,89,26,0.08)" stroke="#E8591A" stroke-width="1.2" transform="rotate(315 100 105)"/>
  
  <!-- Water lines -->
  <line x1="40" y1="152" x2="160" y2="152" stroke="#D4AF37" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="30" y1="160" x2="170" y2="160" stroke="#D4AF37" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
  
  <!-- Stem -->
  <path d="M100 117 Q95 135 98 152" stroke="#D4AF37" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
