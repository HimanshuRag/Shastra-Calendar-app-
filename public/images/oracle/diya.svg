<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Diya (oil lamp) - minimalist line art -->
  <circle cx="100" cy="100" r="98" fill="rgba(232,89,26,0.04)" stroke="rgba(212,175,55,0.15)" stroke-width="1"/>
  
  <!-- Flame -->
  <path d="M100 55 C100 55 92 65 92 75 C92 85 96 90 100 90 C104 90 108 85 108 75 C108 65 100 55 100 55Z" 
    fill="rgba(232,89,26,0.2)" stroke="#E8591A" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M100 62 C100 62 96 70 96 77 C96 82 98 85 100 85 C102 85 104 82 104 77 C104 70 100 62 100 62Z" 
    fill="rgba(244,175,64,0.3)" stroke="#D4AF37" stroke-width="1" stroke-linejoin="round"/>
  <!-- Inner flame glow -->
  <ellipse cx="100" cy="78" rx="3" ry="5" fill="#D4AF37" opacity="0.5"/>
  
  <!-- Wick -->
  <line x1="100" y1="90" x2="100" y2="98" stroke="#4A5568" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Diya bowl -->
  <path d="M72 105 Q72 98 100 98 Q128 98 128 105 Q130 120 100 125 Q70 120 72 105Z" 
    fill="rgba(212,175,55,0.12)" stroke="#D4AF37" stroke-width="1.5"/>
  <path d="M78 115 Q100 120 122 115" stroke="#D4AF37" stroke-width="0.8" fill="none" opacity="0.5"/>
  
  <!-- Diya spout -->
  <path d="M118 108 Q130 103 135 106 Q130 112 118 110Z" fill="rgba(212,175,55,0.15)" stroke="#D4AF37" stroke-width="1.2"/>
  
  <!-- Handle/base -->
  <ellipse cx="100" cy="125" rx="30" ry="5" fill="rgba(212,175,55,0.1)" stroke="#D4AF37" stroke-width="1" opacity="0.6"/>
  
  <!-- Decorative dots around flame - light rays -->
  <circle cx="100" cy="40" r="2" fill="#D4AF37" opacity="0.5"/>
  <circle cx="82" cy="45" r="1.5" fill="#E8591A" opacity="0.4"/>
  <circle cx="118" cy="45" r="1.5" fill="#E8591A" opacity="0.4"/>
  <circle cx="72" cy="60" r="1" fill="#D4AF37" opacity="0.3"/>
  <circle cx="128" cy="60" r="1" fill="#D4AF37" opacity="0.3"/>
  
  <!-- Decorative pattern on base -->
  <path d="M80 132 Q100 140 120 132" stroke="rgba(212,175,55,0.3)" stroke-width="1" fill="none"/>
</svg>
